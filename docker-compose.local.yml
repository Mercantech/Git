# Lokal override: eksponer web på host-port uden Traefik.
# Kør: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  web:
    ports:
      - "${WEB_HOST_PORT:-8080}:80"
    networks:
      - default
    labels: []

networks:
  default:
  dokploy-network:
    external: false
